<title>Daily — leonsomov.com</title>
<script>
  // Set theme before first paint to avoid flash
  (function () {
    try {
      const p = JSON.parse(localStorage.getItem("daily-feed-prefs-v4") || "{}");
      const o = p.todOverride || "auto";
      let band;
      if (o !== "auto") band = o;
      else {
        const h = new Date().getHours();
        band = h >= 6 && h < 12 ? "morning" : h >= 12 && h < 17 ? "afternoon" : "evening";
      }
      document.documentElement.setAttribute("data-tod", band);
    } catch (e) {}
  })();

const RUMOR_WORDS = [
  "leaked","leak","teaser","teased","prototype","unveiled","sneak peek","first look",
  "coming soon","namm","superbooth","messe","knobcon","early look",

// Extra keywords to keep OUT of the Top 5 hero, even if the main negative filter lets them pass.
// Hero is for gentle morning reading — the river can still show these for browsing.
const HERO_BLOCKLIST = [
  "war","wartime","conflict","crisis","refugee","invasion","siege","combat",
  "military","airstrike","famine","riot","deported","coup","arrested","protest",

];

const LS_KEY = "daily-feed-prefs-v4";
const loadPrefs = () => {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
};
const savePrefs = () => localStorage.setItem(LS_KEY, JSON.stringify({
  active: [...state.active],
  category: state.category,
  hideNegative: state.hideNegative,
  dedup: state.dedup,
  hideRead: state.hideRead,
  onlyRumors: state.onlyRumors,
  todOverride: state.todOverride,
}));

const prefs = loadPrefs();

// If no saved category AND it's morning, default to Practice
function defaultCategory() {
  if (prefs.category) return prefs.category;
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return "practice";
  return "all";
}

const state = {
  active: new Set(prefs.active || SOURCES.map(s => s.id)),
  category: defaultCategory(),
  hideNegative: prefs.hideNegative !== false,
  dedup: prefs.dedup !== false,
  hideRead: prefs.hideRead !== false,
  onlyRumors: prefs.onlyRumors === true,
  todOverride: prefs.todOverride || "auto",
  items: [],
  readUrls: new Set(),
  quoteOffset: 0,
};

// --- time-of-day theme ---
const TOD_ORDER = ["auto", "morning", "afternoon", "evening"];
function computeBand() {
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return "morning";
  if (h >= 12 && h < 17) return "afternoon";
  return "evening";
}
function greetingFor(band) {
  return band === "morning" ? "Good morning"
       : band === "afternoon" ? "Good afternoon"
       : "Good evening";
}
function setTheme() {
  const band = state.todOverride === "auto" ? computeBand() : state.todOverride;
  document.documentElement.setAttribute("data-tod", band);
  const d = new Date();
  const dateStr = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  $("#today").textContent = `${greetingFor(band)} · ${dateStr}`;
}
function renderTodToggle() {
  const btn = $("#tod-toggle");
  const label = state.todOverride === "auto" ? "◐ auto" : "◐ " + state.todOverride;
  btn.textContent = label;
  btn.className = "toggle" + (state.todOverride !== "auto" ? " on" : "");
  btn.onclick = () => {
    const idx = TOD_ORDER.indexOf(state.todOverride);
    state.todOverride = TOD_ORDER[(idx + 1) % TOD_ORDER.length];
    savePrefs();
    renderTodToggle();
    setTheme();
  };
}

const $ = sel => document.querySelector(sel);

// --- UI rendering ---

function renderTabs() {
  const box = $("#tabs");
  box.innerHTML = "";
  CATEGORIES.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "tab" + (state.category === c.id ? " on" : "");
    btn.textContent = c.label;
    btn.onclick = () => {
      state.category = c.id;
      savePrefs();
      renderTabs();
      renderChips();
      renderFeed();
    };
    box.appendChild(btn);
  });
}

function renderChips() {
  const box = $("#chips");
  box.innerHTML = "";
  let visible;
  if (state.category === "all") visible = SOURCES;
  else visible = SOURCES.filter(s => s.cat === state.category);
  visible.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "chip" + (state.active.has(s.id) ? " on" : "");
    btn.textContent = s.name;
    btn.onclick = () => {
      if (state.active.has(s.id)) state.active.delete(s.id);
      else state.active.add(s.id);
      savePrefs();
      renderChips();
      renderFeed();
    };
    box.appendChild(btn);
  });
}

function renderToggles() {
  const apply = (id, on, label) => {
    const btn = $("#" + id);
    btn.className = "toggle" + (on ? " on" : "");
    btn.textContent = (on ? "✓ " : "○ ") + label;
  };
  apply("filter-toggle", state.hideNegative, "hide negative");
  apply("dedup-toggle",  state.dedup,        "dedupe");
  apply("hideread-toggle", state.hideRead,   "hide read");
  apply("rumors-toggle", state.onlyRumors,   "rumors only");
  $("#filter-toggle").onclick = () => { state.hideNegative = !state.hideNegative; savePrefs(); renderToggles(); renderFeed(); renderHero(); };
  $("#dedup-toggle").onclick  = () => { state.dedup       = !state.dedup;       savePrefs(); renderToggles(); renderFeed(); renderHero(); };
  $("#hideread-toggle").onclick = () => { state.hideRead  = !state.hideRead;    savePrefs(); renderToggles(); renderFeed(); renderHero(); };
  $("#rumors-toggle").onclick = () => { state.onlyRumors = !state.onlyRumors;   savePrefs(); renderToggles(); renderFeed(); };
  $("#mark-all-read").onclick = markAllRead;
}

async function markAllRead() {
  const visible = [...document.querySelectorAll("article[data-link]")]
    .map(el => el.getAttribute("data-link"))
    .filter(Boolean);
  if (!visible.length) return;
  visible.forEach(u => state.readUrls.add(u));
  saveReadState();
  renderFeed();
  renderHero();
}

// --- helpers ---
function stripHtml(s) {
  const d = document.createElement("div");
  d.innerHTML = s || "";
  return (d.textContent || "").replace(/\s+/g, " ").trim();
}
function truncate(s, n) {
  if (!s) return "";
  return s.length > n ? s.slice(0, n).trim() + "…" : s;
}
function formatDate(d) {
  if (!d || isNaN(d)) return "";
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 3600) return Math.max(1, Math.round(diff / 60)) + "m ago";
  if (diff < 86400) return Math.round(diff / 3600) + "h ago";
  if (diff < 86400 * 7) return Math.round(diff / 86400) + "d ago";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function containsAny(hay, list) {
  const h = hay.toLowerCase();
  return list.some(w => h.includes(w));
}
function isNegative(i) { return containsAny(i.title + " " + i.excerpt, NEGATIVE_WORDS); }
function isRumor(i)    { return containsAny(i.title + " " + i.excerpt, RUMOR_WORDS); }
function heroAppropriate(i) { return !containsAny(i.title + " " + i.excerpt, HERO_BLOCKLIST); }
function positivityScore(i) {
  const hay = (i.title + " " + i.excerpt).toLowerCase();
  let pos = 0;
  POSITIVE_WORDS.forEach(w => { if (hay.includes(w)) pos += 1; });
  return pos;
}

// fuzzy title key for dedup
function dedupKey(title) {
  return title.toLowerCase()
    .replace(/[^a-z0-9 ]+/g, "")
    .split(/\s+/).slice(0, 8).join(" ");
}

// --- fetching ---
// Public CORS proxies with fallback (GitHub Pages has no server).
// If one is down we try the next. Slower and flakier than an owned Worker,
// but zero infrastructure — works anywhere as static HTML.
const CORS_PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
];

async function fetchFeed(source, fresh = false) {
  let lastErr;
  for (const makeUrl of CORS_PROXIES) {
    try {
      const res = await fetch(makeUrl(source.url), { cache: fresh ? "no-store" : "default" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      if (!text || text.length < 50) throw new Error("empty body");
      return text;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("all proxies failed");
}

function extractImage(it, descText) {
  // Try Media RSS, enclosure, itunes:image, then first <img> in description HTML
  const mediaThumb = it.getElementsByTagNameNS("*", "thumbnail")[0];
  if (mediaThumb && mediaThumb.getAttribute("url")) return mediaThumb.getAttribute("url");
  const mediaContent = it.getElementsByTagNameNS("*", "content")[0];
  if (mediaContent && mediaContent.getAttribute("url")) {
    const type = mediaContent.getAttribute("type") || "";
    if (type.startsWith("image/") || !type) return mediaContent.getAttribute("url");
  }
  const enclosure = it.querySelector("enclosure");
  if (enclosure) {
    const type = enclosure.getAttribute("type") || "";
    if (type.startsWith("image/")) return enclosure.getAttribute("url");
  }
  const itunesImg = it.getElementsByTagNameNS("*", "image")[0];
  if (itunesImg && itunesImg.getAttribute("href")) return itunesImg.getAttribute("href");
  // Parse first <img> from description/content
  if (descText) {
    const m = descText.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (m) return m[1];
  }
  return null;
}

function detectVideo(link, descText) {
  if (!link) return false;
  if (/youtube\.com\/watch|youtu\.be\/|vimeo\.com\/\d|bitchute\.com|rumble\.com\/v/.test(link)) return true;
  if (descText && /<iframe[^>]+(?:youtube|vimeo)/i.test(descText)) return true;
  return false;
}

function youtubeThumb(link) {
  const m = link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/);
  return m ? `https://i.ytimg.com/vi/${m[1]}/hqdefault.jpg` : null;
}

function parseFeed(xmlText, source) {
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  if (doc.querySelector("parsererror")) return [];
  const items = [...doc.querySelectorAll("item"), ...doc.querySelectorAll("entry")];
  const cap = source.maxItems || 15;
  return items.slice(0, cap).map(it => {
    const get = tag => it.querySelector(tag)?.textContent?.trim() || "";
    const title = get("title");
    let link = get("link");
    if (!link) {
      const linkEl = it.querySelector("link[href]");
      if (linkEl) link = linkEl.getAttribute("href");
    }
    const desc = get("description") || get("summary") || get("content");
    const pub = get("pubDate") || get("published") || get("updated");
    const date = pub ? new Date(pub) : null;
    let excerpt = stripHtml(desc);
    const isVideo = detectVideo(link, desc);
    let image = extractImage(it, desc);
    if (!image && isVideo) image = youtubeThumb(link);
    return {
      source: source.name,
      sourceId: source.id,
      cat: source.cat,
      weight: source.weight,
      title: stripHtml(title),
      link,
      excerpt: truncate(excerpt, 280),
      date,
      image,
      isVideo,
    };
  }).filter(x => x.title && x.link);
}

// --- filtering / ranking ---
function applyFilters(items, opts = {}) {
  let out = items.slice();
  if (state.hideNegative) out = out.filter(i => !isNegative(i));
  if (state.dedup) {
    const seen = new Map();
    for (const i of out) {
      const k = dedupKey(i.title);
      if (!seen.has(k)) seen.set(k, i);
      else if ((i.weight || 0) > (seen.get(k).weight || 0)) seen.set(k, i);
    }
    out = [...seen.values()];
  }
  if (!opts.keepRead && state.hideRead) out = out.filter(i => !state.readUrls.has(i.link));
  return out;
}

function rankTop(items, n = 5) {
  const now = Date.now();
  // Hero is for curated editorial — exclude heavy-topic stories
  return items.filter(heroAppropriate).map(i => {
    const ageH = i.date ? (now - i.date.getTime()) / 3600000 : 72;
    const recency = Math.exp(-ageH / 48);
    const pos = Math.max(0, positivityScore(i) + 1);
    const rumorBoost = isRumor(i) ? 1.4 : 1.0;
    const score = (i.weight || 0.5) * recency * (0.5 + 0.5 * pos) * rumorBoost;
    return { ...i, _score: score };
  }).sort((a, b) => b._score - a._score).slice(0, n);
}

// --- render top 5 hero ---
function renderHero() {
  const base = applyFilters(state.items);
  const top = rankTop(base, 5);
  if (!top.length) { $("#hero").style.display = "none"; return; }
  $("#hero").style.display = "block";
  $("#river-rule").style.display = "block";
  $("#top-list").innerHTML = top.map((i, idx) => {
    const isRead = state.readUrls.has(i.link);
    return `
      <div class="top-item ${isRead ? 'read' : ''}" data-link="${i.link}">
        <div class="top-num">${idx + 1}</div>
        <div class="top-body">
          <div class="top-src">${i.source} · ${formatDate(i.date)}${isRumor(i) ? ' · RUMOR' : ''}</div>
          <h3 class="top-title"><a href="${i.link}" target="_blank" rel="noopener">${i.title}</a></h3>
          ${i.excerpt ? `<p class="top-summary">${i.excerpt}</p>` : ""}
        </div>
      </div>
    `;
  }).join("");
  $("#top-list").querySelectorAll("a").forEach(a => {
    a.addEventListener("click", () => markRead(a.getAttribute("href")));
  });
}

// --- render feed river ---
function renderFeed() {
  const feed = $("#feed");
  let items = applyFilters(state.items, { keepRead: !state.hideRead });
  items = items.filter(i => state.active.has(i.sourceId));
  if (state.onlyRumors) items = items.filter(isRumor);
  if (state.category !== "all") items = items.filter(i => i.cat === state.category);
  items.sort((a, b) => (b.date?.getTime() || 0) - (a.date?.getTime() || 0));
  if (!items.length) {
    feed.innerHTML = '<div class="loading">No items in this view. Try another category or toggle filters.</div>';
    return;
  }
  feed.innerHTML = items.map(i => {
    const isRead = state.readUrls.has(i.link);
    const thumbHtml = i.image
      ? `<div class="thumb ${i.isVideo ? 'video' : ''}"><img loading="lazy" src="${i.image}" alt=""></div>`
      : "";
    return `
      <article class="${isRead ? 'read' : ''}" data-link="${i.link}">
        <div class="body">
          <div class="src">${i.source}<span class="date">${formatDate(i.date)}</span>${isRumor(i) ? '<span class="rumor-tag">rumor</span>' : ''}</div>
          <h2><a href="${i.link}" target="_blank" rel="noopener">${i.title}</a></h2>
          ${i.excerpt ? `<p class="excerpt">${i.excerpt}</p>` : ""}
          ${i.excerpt ? `<p class="excerpt-lt" data-for="${i.link}"></p>` : ""}
        </div>
        ${thumbHtml}
      </article>
    `;
  }).join("");
  feed.querySelectorAll("a").forEach(a => {
    a.addEventListener("click", () => markRead(a.getAttribute("href")));
  });
  translateVisible();
}

// --- read state (localStorage only, web version) ---
const READ_KEY = "daily-read-urls-v1";
async function loadReadState() {
  try {
    const arr = JSON.parse(localStorage.getItem(READ_KEY) || "[]");
    state.readUrls = new Set(arr);
  } catch (e) { /* ignore */ }
}

function saveReadState() {
  // cap at 5000 newest
  const arr = [...state.readUrls].slice(-5000);
  localStorage.setItem(READ_KEY, JSON.stringify(arr));
}

async function markRead(url) {
  if (!url || state.readUrls.has(url)) return;
  state.readUrls.add(url);
  saveReadState();
  document.querySelectorAll(`[data-link="${CSS.escape(url)}"]`).forEach(el => el.classList.add("read"));
}

// --- main load ---
let QUOTES_CACHE = null;
async function loadQuote() {
  try {
    if (!QUOTES_CACHE) {
      const res = await fetch("/daily/quotes.json");
      if (!res.ok) return;
      QUOTES_CACHE = await res.json();
    }
    renderQuote();
    $("#quote-reroll").onclick = () => {
      state.quoteOffset = (state.quoteOffset + 1) % QUOTES_CACHE.length;
      renderQuote();
    };
  } catch (e) { /* ignore */ }
}

function renderQuote() {
  if (!QUOTES_CACHE || !QUOTES_CACHE.length) return;
  const d = new Date();
  const dayNum = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  const base = ((dayNum * 2654435761) >>> 0) % QUOTES_CACHE.length;
  const q = QUOTES_CACHE[(base + state.quoteOffset) % QUOTES_CACHE.length];
  $("#quote-text").textContent = "“" + q.text + "”";
  $("#quote-text-lt").textContent = q.text_lt ? "„" + q.text_lt + "“" : "";
  $("#quote-text-lt").style.display = q.text_lt ? "block" : "none";
  $("#quote-attr").textContent = "— " + q.by;
  $("#quote").style.display = "block";
}

// --- Lithuanian translation for article excerpts ---
const TRANS_CACHE_KEY = "daily-trans-lt-v1";
function loadTransCache() {
  try { return JSON.parse(localStorage.getItem(TRANS_CACHE_KEY)) || {}; } catch { return {}; }
}
function saveTransCache(cache) {
  // cap at 1000 entries, drop oldest
  const entries = Object.entries(cache);
  if (entries.length > 1000) {
    entries.sort((a, b) => (b[1].ts || 0) - (a[1].ts || 0));
    const trimmed = Object.fromEntries(entries.slice(0, 1000));
    localStorage.setItem(TRANS_CACHE_KEY, JSON.stringify(trimmed));
  } else {
    localStorage.setItem(TRANS_CACHE_KEY, JSON.stringify(cache));
  }
}

let transInFlight = null;
async function translateVisible() {
  // Cancel any previous batch so category switches don't pile up
  const myBatch = Symbol("batch");
  transInFlight = myBatch;

  const cache = loadTransCache();
  const now = Date.now();
  const els = [...document.querySelectorAll(".excerpt-lt[data-for]")];
  // Limit to top 25 visible to stay under free-tier rate limits
  const targets = els.slice(0, 25);

  for (const el of targets) {
    if (transInFlight !== myBatch) return; // cancelled
    const link = el.getAttribute("data-for");
    const item = state.items.find(i => i.link === link);
    if (!item || !item.excerpt) continue;
    const key = item.excerpt;
    if (cache[key] && cache[key].text) {
      el.textContent = cache[key].text;
      continue;
    }
    el.textContent = "…";
    el.classList.add("pending");
    try {
      // Direct call to MyMemory (serves CORS, free, no key).
      // `de=` email param lifts the daily limit from 5k to 50k words.
      const q = encodeURIComponent(item.excerpt.slice(0, 500));
      const res = await fetch(`https://api.mymemory.translated.net/get?q=${q}&langpair=en|lt&de=daily@leonsomov.com`);
      if (!res.ok) { el.textContent = ""; continue; }
      const data = await res.json();
      const text = ((data || {}).responseData || {}).translatedText || "";
      el.textContent = text;
      el.classList.remove("pending");
      if (text) {
        cache[key] = { text, ts: now };
        saveTransCache(cache);
      }
    } catch (e) {
      el.textContent = "";
    }
  }
}

async function fetchWithRetry(source, fresh) {
  try {
    return await fetchFeed(source, fresh);
  } catch (e) {
    await new Promise(r => setTimeout(r, 1000));
    return await fetchFeed(source, fresh);
  }
}

async function loadAll(fresh = false) {
  $("#status").textContent = "Fetching " + SOURCES.length + " feeds…";
  state.items = [];
  $("#feed").innerHTML = '<div class="loading">Fetching…</div>';
  $("#hero").style.display = "none";
  $("#river-rule").style.display = "none";
  const collected = [];
  let ok = 0, fail = 0;
  await Promise.all(SOURCES.map(async s => {
    try {
      const xml = await fetchWithRetry(s, fresh);
      collected.push(...parseFeed(xml, s));
      ok++;
    } catch (e) {
      fail++;
      console.warn("Failed:", s.name, e);
    }
  }));
  state.items = collected;
  renderHero();
  renderFeed();
  const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  $("#status").textContent = `${ok} feeds · ${state.items.length} stories${fail ? ` · ${fail} failed` : ""} · ${now}`;
  if (!state.items.length) {
    $("#feed").innerHTML = '<div class="loading">All feeds failed. Check that the local server is running.</div>';
  }
}

$("#refresh").onclick = () => loadAll(true);

// --- init ---
(async () => {
  setTheme();
  renderTodToggle();
  renderTabs();
  renderChips();
  renderToggles();
  await Promise.all([loadReadState(), loadQuote()]);
  await loadAll();
  // re-check theme every 10 min (auto mode only)
  setInterval(() => { if (state.todOverride === "auto") setTheme(); }, 10 * 60 * 1000);
})();
</script>
</body>
</html>

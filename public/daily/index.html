<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4efe1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Daily">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" type="image/svg+xml" href="/daily/icon.svg">
<link rel="apple-touch-icon" href="/daily/icon.png">
<link rel="manifest" href="/daily/manifest.webmanifest">
<title>Daily — leonsomov.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&display=swap" rel="stylesheet">
<script>
  // Set theme before first paint to avoid flash
  (function () {
    try {
      const p = JSON.parse(localStorage.getItem("daily-feed-prefs-v4") || "{}");
      const o = p.todOverride || "auto";
      let band;
      if (o !== "auto") band = o;
      else {
        const h = new Date().getHours();
        band = h >= 6 && h < 12 ? "morning" : h >= 12 && h < 17 ? "afternoon" : "evening";
      }
      document.documentElement.setAttribute("data-tod", band);
    } catch (e) {}
  })();
</script>
<style>
  :root {
    --serif:    "Fraunces", "Charter", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans:     -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    /* defaults = afternoon baseline */
    --bg:       #f4efe1;
    --bg-soft:  #faf6e9;
    --ink:      #1f1a14;
    --ink-soft: #3d372d;
    --muted:    #6b6456;
    --dim:      #a29a88;
    --rule:     #e2dcc8;
    --accent:   #9c3b18;
    --max:      620px;
    --ease:     cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  [data-tod="morning"] {
    --bg:       #fbf6ea;
    --bg-soft:  #f5ecd5;
    --ink:      #1a1610;
    --ink-soft: #3a3224;
    --muted:    #6b6456;
    --dim:      #a89f88;
    --rule:     #ebe1c4;
    --accent:   #c76a2e;
  }
  [data-tod="afternoon"] {
    --bg:       #f4efe1;
    --bg-soft:  #faf6e9;
    --ink:      #1f1a14;
    --ink-soft: #3d372d;
    --muted:    #6b6456;
    --dim:      #a29a88;
    --rule:     #e2dcc8;
    --accent:   #9c3b18;
  }
  [data-tod="evening"] {
    --bg:       #efe7d2;
    --bg-soft:  #e8ddc0;
    --ink:      #2a2118;
    --ink-soft: #433828;
    --muted:    #6b6456;
    --dim:      #9c9580;
    --rule:     #d9cfb5;
    --accent:   #8a4a1e;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: var(--serif);
    font-optical-sizing: auto;
    /* Old-style figures, discretionary ligatures, stylistic alternates */
    font-feature-settings: "onum" 1, "liga" 1, "dlig" 1, "kern" 1, "ss01" 1;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color 600ms ease, color 600ms ease;
  }
  body {
    max-width: var(--max);
    margin: 0 auto;
    padding: 96px 40px 160px;
    position: relative;
  }

  /* Paper grain texture — SVG turbulence noise fixed to viewport */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.045;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.15  0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* Small caps utility class */
  .smcp {
    font-feature-settings: "smcp" 1, "c2sc" 1, "onum" 1, "kern" 1;
    letter-spacing: 0.08em;
  }

  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--accent); }

  /* ————————————— Masthead ————————————— */
  .masthead {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 56px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--rule);
  }
  .masthead-left h1 {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
    color: var(--ink);
    line-height: 1;
  }
  .masthead-left .meta {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    font-feature-settings: "smcp" 1, "onum" 1;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }
  .gear {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-family: inherit; font-size: 16px;
    padding: 6px;
    line-height: 1;
    transition: color 200ms var(--ease), transform 400ms var(--ease);
    align-self: flex-start;
    margin-top: 4px;
  }
  .gear:hover { color: var(--accent); transform: rotate(60deg); }

  /* ————————————— Pull quote with true drop cap ————————————— */
  .quote {
    margin: 0 0 80px;
    padding: 0;
    position: relative;
  }
  .quote-inner {
    text-align: left;
    hanging-punctuation: first;
  }
  .quote-text {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 14px;
    letter-spacing: -0.005em;
  }
  .quote-text-lt {
    font-family: var(--serif);
    font-size: 14.5px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.55;
    color: var(--muted);
    margin: 0;
  }
  .quote-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 22px;
    clear: both;
  }
  .quote-attr {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    margin: 0;
    font-feature-settings: "smcp" 1, "onum" 1;
    letter-spacing: 0.06em;
  }
  .quote-reroll {
    background: none; border: none;
    color: var(--dim); font-size: 13px;
    cursor: pointer; font-family: inherit;
    padding: 4px 6px; opacity: 0.4;
    transition: opacity 200ms, transform 400ms var(--ease), color 200ms;
  }
  .quote-reroll:hover { opacity: 1; color: var(--accent); transform: rotate(180deg); }

  .dinkus { display: none; }

  /* ————————————— Tabs ————————————— */
  .tabs {
    display: flex;
    gap: 0;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 52px;
    font-family: var(--serif);
  }
  .tab {
    font-size: 12px;
    padding: 14px 0;
    margin-right: 28px;
    color: var(--muted);
    cursor: pointer;
    background: none; border: none;
    font-family: inherit;
    font-feature-settings: "smcp" 1, "c2sc" 1, "onum" 1;
    letter-spacing: 0.1em;
    font-weight: 400;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    transition: color 200ms, border-color 200ms;
  }
  .tab:last-child { margin-right: 0; }
  .tab.on {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }
  .tab:hover { color: var(--ink); }

  /* ————————————— Section header ————————————— */
  .section-head {
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    font-weight: 400;
    margin: 0 0 36px;
    font-feature-settings: "smcp" 1, "onum" 1;
    letter-spacing: 0.08em;
  }

  /* ————————————— Featured story ————————————— */
  .featured {
    display: block;
    margin-bottom: 72px;
    cursor: pointer;
  }
  .featured-img {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--bg-soft);
    border: 1px solid var(--rule);
    overflow: hidden;
    margin-bottom: 26px;
    position: relative;
    filter: saturate(0.92) contrast(1.02);
  }
  .featured-img img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .featured-img.video::after {
    content: "▶";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 44px;
    text-shadow: 0 0 20px rgba(0,0,0,0.6);
    background: rgba(0,0,0,0.18);
    pointer-events: none;
  }
  .featured .meta {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    font-feature-settings: "smcp" 1, "onum" 1;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    gap: 10px;
    align-items: baseline;
  }
  .featured .meta .src-name { color: var(--accent); }
  .featured .meta .sep { color: var(--dim); font-style: normal; }
  .featured .meta .date { color: var(--muted); }
  .featured h2 {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 500;
    font-variation-settings: "opsz" 144;
    line-height: 1.1;
    letter-spacing: -0.022em;
    margin: 0 0 18px;
    color: var(--ink);
    transition: color 200ms;
  }
  .featured:hover h2 { color: var(--accent); }
  .featured .excerpt {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 0;
    font-weight: 400;
  }
  .featured .excerpt-lt {
    font-family: var(--serif);
    font-size: 13.5px;
    font-style: italic;
    line-height: 1.55;
    color: var(--muted);
    margin: 12px 0 0;
    min-height: 1.55em;
  }

  /* ————————————— Article items ————————————— */
  .item {
    display: flex;
    gap: 20px;
    padding: 28px 0;
    border-top: 1px solid var(--rule);
    cursor: pointer;
  }
  .item:first-child { border-top: none; padding-top: 4px; }
  .item.compact { padding: 22px 0; }
  .item-num { display: none; }
  .item-body { flex: 1; min-width: 0; }
  .item-thumb {
    flex-shrink: 0;
    width: 88px;
    aspect-ratio: 1;
    background: var(--bg-soft);
    border: 1px solid var(--rule);
    overflow: hidden;
    position: relative;
    filter: saturate(0.9) contrast(1.02);
    align-self: start;
    margin-top: 4px;
  }
  .item-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .item-thumb.video::after {
    content: "▶";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
    text-shadow: 0 0 12px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.22);
    pointer-events: none;
  }
  .item .meta {
    font-family: var(--serif);
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    font-feature-settings: "smcp" 1, "onum" 1;
    letter-spacing: 0.06em;
    margin-bottom: 7px;
    display: flex;
    gap: 8px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .item .meta .src-name { color: var(--accent); }
  .item .meta .sep { color: var(--dim); font-style: normal; }
  .item .meta .date { color: var(--muted); }
  .item .meta .tag {
    font-size: 9px;
    font-style: normal;
    padding: 1px 6px;
    background: var(--accent);
    color: var(--bg-soft);
    letter-spacing: 0.08em;
  }
  .item h2 {
    font-family: var(--serif);
    font-size: 21px;
    font-weight: 500;
    font-variation-settings: "opsz" 36;
    line-height: 1.25;
    letter-spacing: -0.012em;
    margin: 0 0 10px;
    color: var(--ink);
    transition: color 200ms;
  }
  .item:hover h2 { color: var(--accent); }
  .item .excerpt {
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0;
  }
  .item .excerpt-lt {
    font-family: var(--serif);
    font-size: 12.5px;
    font-style: italic;
    line-height: 1.55;
    color: var(--muted);
    margin: 6px 0 0;
    min-height: 1.55em;
  }
  .item.read {
    opacity: 0.42;
  }
  .item.read .item-num,
  .item.read .meta { color: var(--dim); }

  /* Section spacing */
  .river { margin-top: 56px; }
  .loading {
    font-family: var(--sans); color: var(--muted);
    font-size: 12px; padding: 24px 0; font-style: italic;
    text-align: center;
  }

  /* ————————————— Drawer ————————————— */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(31, 26, 20, 0);
    pointer-events: none;
    transition: background 300ms var(--ease);
    z-index: 50;
  }
  .drawer-overlay.open {
    background: rgba(31, 26, 20, 0.35);
    pointer-events: auto;
  }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border-left: 1px solid var(--rule);
    padding: 48px 32px 48px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 360ms var(--ease);
    z-index: 51;
    box-shadow: 0 0 0 rgba(0,0,0,0);
  }
  .drawer.open {
    transform: translateX(0);
    box-shadow: -8px 0 40px rgba(31,26,20,0.08);
  }
  .drawer-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 40px;
  }
  .drawer-head h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    margin: 0;
  }
  .drawer-close {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 22px; padding: 4px 10px;
    line-height: 1;
  }
  .drawer-close:hover { color: var(--accent); }
  .drawer-section {
    margin-bottom: 40px;
  }
  .drawer-section h3 {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 14px;
  }
  .toggle-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .toggle {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color 200ms, border-color 200ms, background 200ms;
  }
  .toggle.on {
    color: var(--bg-soft);
    background: var(--ink);
    border-color: var(--ink);
  }
  .toggle:hover { color: var(--ink); }
  .toggle.on:hover { color: var(--bg-soft); }

  .chip-group {
    margin-bottom: 22px;
  }
  .chip-group-label {
    font-family: var(--sans);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    font-family: var(--sans);
    font-size: 10px;
    padding: 5px 10px;
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    background: transparent;
    letter-spacing: 0.02em;
    transition: color 200ms, background 200ms, border-color 200ms;
  }
  .chip.on {
    color: var(--bg-soft);
    background: var(--accent);
    border-color: var(--accent);
  }
  .chip:hover { color: var(--ink); }
  .chip.on:hover { color: var(--bg-soft); }

  .drawer-status {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    margin: 24px 0 0;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }
  .drawer-refresh {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    margin-top: 14px;
  }
  .drawer-refresh:hover { color: var(--accent); border-color: var(--accent); }

  footer {
    font-family: var(--sans);
    color: var(--dim);
    font-size: 9px;
    margin-top: 96px;
    text-align: center;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* ————————————— Mobile ————————————— */
  @media (max-width: 600px) {
    body { padding: calc(56px + env(safe-area-inset-top, 0)) 22px 120px; }
    .masthead { margin-bottom: 44px; }
    .masthead-left h1 { font-size: 28px; }
    .masthead-left .meta { font-size: 11px; }
    .quote { margin-bottom: 60px; }
    .quote-text { font-size: 22px; }
    .quote-text::first-letter { font-size: 6.5em; }
    .quote-text-lt { font-size: 14px; }
    .tabs { margin-bottom: 44px; overflow-x: auto; flex-wrap: nowrap; }
    .tab { margin-right: 24px; white-space: nowrap; padding: 12px 0; font-size: 12px; }
    .featured { margin-bottom: 56px; }
    .featured h2 { font-size: 26px; }
    .featured .excerpt { font-size: 15px; }
    .section-head { font-size: 14px; margin-bottom: 32px; }
    .section-head::before,
    .section-head::after { width: 28px; margin: 0 12px; }
    .item {
      grid-template-columns: 22px 1fr 68px;
      gap: 12px;
      padding: 22px 0;
    }
    .item.no-thumb { grid-template-columns: 22px 1fr; }
    .item-num { font-size: 11px; }
    .item-thumb { width: 68px; }
    .item h2 { font-size: 17px; }
    .item .excerpt { font-size: 13px; }
    .river { margin-top: 48px; }
    .dinkus { margin: 56px 0 36px; font-size: 18px; }
    .drawer { max-width: 100%; padding: 40px 24px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <h1>Daily</h1>
    <div class="meta" id="today"></div>
  </div>
  <button class="gear" id="open-drawer" title="Settings" aria-label="Settings">⚙</button>
</header>

<section class="quote" id="quote" style="display:none;">
  <div class="quote-inner">
    <p class="quote-text" id="quote-text"></p>
    <p class="quote-text-lt" id="quote-text-lt"></p>
    <div class="quote-footer">
      <p class="quote-attr" id="quote-attr"></p>
      <button class="quote-reroll" id="quote-reroll" title="Another quote">↻</button>
    </div>
  </div>
</section>

<nav class="tabs" id="tabs"></nav>

<section class="hero" id="hero" style="display:none;">
  <h3 class="section-head">Today's reading</h3>
  <div id="featured"></div>
  <div id="top-list"></div>
</section>

<section class="river" id="river-section">
  <h3 class="section-head" id="river-head" style="display:none;">All stories</h3>
  <main id="feed"><div class="loading">Fetching…</div></main>
</section>

<footer>Daily · a morning ritual</footer>

<!-- Settings drawer -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <h2>Settings</h2>
    <button class="drawer-close" id="close-drawer" aria-label="Close">×</button>
  </div>

  <div class="drawer-section">
    <h3>Filters</h3>
    <div class="toggle-row">
      <button class="toggle on" id="filter-toggle">hide negative</button>
      <button class="toggle on" id="dedup-toggle">de-duplicate</button>
      <button class="toggle on" id="hideread-toggle">hide read</button>
      <button class="toggle" id="rumors-toggle">rumors only</button>
    </div>
  </div>

  <div class="drawer-section">
    <h3>Actions</h3>
    <div class="toggle-row">
      <button class="toggle" id="mark-all-read">mark all read</button>
      <button class="toggle" id="tod-toggle" title="Time-of-day theme">◐ auto</button>
    </div>
  </div>

  <div class="drawer-section">
    <h3>Sources</h3>
    <div id="drawer-chips"></div>
  </div>

  <div class="drawer-status" id="status">Loading…</div>
  <button class="drawer-refresh" id="refresh">↻ refresh feeds</button>
</aside>

<script>
const SOURCES = [
  // Progress
  { id: "pn",   cat: "progress", weight: 1.00, name: "Positive News",          url: "https://www.positive.news/feed/" },

// --- time-of-day theme ---
const TOD_ORDER = ["auto", "morning", "afternoon", "evening"];
function computeBand() {
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return "morning";
  if (h >= 12 && h < 17) return "afternoon";
  return "evening";
}
function greetingFor(band) {
  return band === "morning" ? "Good morning"
       : band === "afternoon" ? "Good afternoon"
       : "Good evening";
}
function setTheme() {
  const band = state.todOverride === "auto" ? computeBand() : state.todOverride;
  document.documentElement.setAttribute("data-tod", band);
  const d = new Date();
  const dateStr = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  $("#today").textContent = `${greetingFor(band)} · ${dateStr}`;
}
function renderTodToggle() {
  const btn = $("#tod-toggle");
  const label = state.todOverride === "auto" ? "◐ auto" : "◐ " + state.todOverride;
  btn.textContent = label;
  btn.className = "toggle" + (state.todOverride !== "auto" ? " on" : "");

  };
}

// --- helpers ---
function stripHtml(s) {
  const d = document.createElement("div");
  d.innerHTML = s || "";
  return (d.textContent || "").replace(/\s+/g, " ").trim();
}
function truncate(s, n) {
  if (!s) return "";
  return s.length > n ? s.slice(0, n).trim() + "…" : s;
}
function formatDate(d) {
  if (!d || isNaN(d)) return "";
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 3600) return Math.max(1, Math.round(diff / 60)) + "m ago";
  if (diff < 86400) return Math.round(diff / 3600) + "h ago";
  if (diff < 86400 * 7) return Math.round(diff / 86400) + "d ago";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function containsAny(hay, list) {
  const h = hay.toLowerCase();
  return list.some(w => h.includes(w));
}
function isNegative(i) { return containsAny(i.title + " " + i.excerpt, NEGATIVE_WORDS); }
function isRumor(i)    { return containsAny(i.title + " " + i.excerpt, RUMOR_WORDS); }
function heroAppropriate(i) { return !containsAny(i.title + " " + i.excerpt, HERO_BLOCKLIST); }
function positivityScore(i) {
  const hay = (i.title + " " + i.excerpt).toLowerCase();
  let pos = 0;
  POSITIVE_WORDS.forEach(w => { if (hay.includes(w)) pos += 1; });
  return pos;
}

// fuzzy title key for dedup
function dedupKey(title) {
  return title.toLowerCase()
    .replace(/[^a-z0-9 ]+/g, "")
    .split(/\s+/).slice(0, 8).join(" ");
}

// --- fetching ---
// Public CORS proxies with fallback (GitHub Pages has no server).
const CORS_PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
];

async function fetchFeed(source, fresh = false) {
  let lastErr;
  for (const makeUrl of CORS_PROXIES) {
    try {
      const res = await fetch(makeUrl(source.url), { cache: fresh ? "no-store" : "default" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      if (!text || text.length < 50) throw new Error("empty body");
      return text;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("all proxies failed");
}

function extractImage(it, descText) {
  // Try Media RSS, enclosure, itunes:image, then first <img> in description HTML
  const mediaThumb = it.getElementsByTagNameNS("*", "thumbnail")[0];
  if (mediaThumb && mediaThumb.getAttribute("url")) return mediaThumb.getAttribute("url");
  const mediaContent = it.getElementsByTagNameNS("*", "content")[0];
  if (mediaContent && mediaContent.getAttribute("url")) {
    const type = mediaContent.getAttribute("type") || "";
    if (type.startsWith("image/") || !type) return mediaContent.getAttribute("url");
  }
  const enclosure = it.querySelector("enclosure");
  if (enclosure) {
    const type = enclosure.getAttribute("type") || "";
    if (type.startsWith("image/")) return enclosure.getAttribute("url");
  }
  const itunesImg = it.getElementsByTagNameNS("*", "image")[0];
  if (itunesImg && itunesImg.getAttribute("href")) return itunesImg.getAttribute("href");
  // Parse first <img> from description/content
  if (descText) {
    const m = descText.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (m) return m[1];
  }
  return null;
}

function detectVideo(link, descText) {
  if (!link) return false;
  if (/youtube\.com\/watch|youtu\.be\/|vimeo\.com\/\d|bitchute\.com|rumble\.com\/v/.test(link)) return true;
  if (descText && /<iframe[^>]+(?:youtube|vimeo)/i.test(descText)) return true;
  return false;
}

function youtubeThumb(link) {
  const m = link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/);
  return m ? `https://i.ytimg.com/vi/${m[1]}/hqdefault.jpg` : null;
}

function parseFeed(xmlText, source) {
  const doc = new DOMParser().parseFromString(xmlText, "application/xml");
  if (doc.querySelector("parsererror")) return [];
  const items = [...doc.querySelectorAll("item"), ...doc.querySelectorAll("entry")];
  const cap = source.maxItems || 15;
  return items.slice(0, cap).map(it => {
    const get = tag => it.querySelector(tag)?.textContent?.trim() || "";
    const title = get("title");
    let link = get("link");
    if (!link) {
      const linkEl = it.querySelector("link[href]");
      if (linkEl) link = linkEl.getAttribute("href");
    }
    const desc = get("description") || get("summary") || get("content");
    const pub = get("pubDate") || get("published") || get("updated");
    const date = pub ? new Date(pub) : null;
    let excerpt = stripHtml(desc);
    const isVideo = detectVideo(link, desc);
    let image = extractImage(it, desc);
    if (!image && isVideo) image = youtubeThumb(link);
    return {
      source: source.name,
      sourceId: source.id,
      cat: source.cat,
      weight: source.weight,
      title: stripHtml(title),
      link,
      excerpt: truncate(excerpt, 280),
      date,
      image,
      isVideo,
    };
  }).filter(x => x.title && x.link);
}

// --- filtering / ranking ---
function applyFilters(items, opts = {}) {
  let out = items.slice();
  if (state.hideNegative) out = out.filter(i => !isNegative(i));
  if (state.dedup) {
    const seen = new Map();
    for (const i of out) {
      const k = dedupKey(i.title);
      if (!seen.has(k)) seen.set(k, i);
      else if ((i.weight || 0) > (seen.get(k).weight || 0)) seen.set(k, i);
    }
    out = [...seen.values()];
  }
  if (!opts.keepRead && state.hideRead) out = out.filter(i => !state.readUrls.has(i.link));
  return out;
}

function rankTop(items, n = 5) {
  const now = Date.now();
  // Hero is for curated editorial — exclude heavy-topic stories
  return items.filter(heroAppropriate).map(i => {
    const ageH = i.date ? (now - i.date.getTime()) / 3600000 : 72;
    const recency = Math.exp(-ageH / 48);
    const pos = Math.max(0, positivityScore(i) + 1);
    const rumorBoost = isRumor(i) ? 1.4 : 1.0;
    const score = (i.weight || 0.5) * recency * (0.5 + 0.5 * pos) * rumorBoost;
    return { ...i, _score: score };
  }).sort((a, b) => b._score - a._score).slice(0, n);
}

// --- render Top Today (featured + 4 list items) ---
function renderHero() {
  // Only show hero when viewing All and not in rumors-only mode
  if (state.category !== "all" || state.onlyRumors) {
    $("#hero").style.display = "none";
    $("#river-head").style.display = "none";
    return;
  }
  const base = applyFilters(state.items);
  const top = rankTop(base, 5);
  if (!top.length) {
    $("#hero").style.display = "none";
    $("#river-head").style.display = "none";
    return;
  }
  $("#hero").style.display = "block";
  $("#river-head").style.display = "block";

  // Featured (first item)
  const f = top[0];
  const fRead = state.readUrls.has(f.link);
  const fImage = f.image
    ? `<div class="featured-img ${f.isVideo ? 'video' : ''}"><img loading="lazy" src="${f.image}" alt=""></div>`
    : "";
  $("#featured").innerHTML = `
    <a class="featured ${fRead ? 'read' : ''}" href="${f.link}" target="_blank" rel="noopener" data-link="${f.link}">
      ${fImage}
      <div class="meta">
        <span class="src-name">${f.source}</span>
        <span class="sep">·</span>
        <span class="date">${formatDate(f.date)}</span>
        ${isRumor(f) ? '<span class="sep">·</span><span class="date">rumor</span>' : ''}
      </div>
      <h2>${f.title}</h2>
      ${f.excerpt ? `<p class="excerpt">${f.excerpt}</p>` : ""}
      ${f.excerpt ? `<p class="excerpt-lt" data-for="${f.link}"></p>` : ""}
    </a>
  `;
  $("#featured a.featured").addEventListener("click", () => markRead(f.link));

  // Top list (items 2-5, compact)
  const rest = top.slice(1);
  $("#top-list").innerHTML = rest.map(i => renderItemHtml(i, true)).join("");
  $("#top-list").querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      const link = el.getAttribute("data-link");
      window.open(link, "_blank", "noopener");
      markRead(link);
    });
  });
  translateVisible();
}

function renderItemHtml(i, compact = false) {
  const isRead = state.readUrls.has(i.link);
  const thumbHtml = i.image
    ? `<div class="item-thumb ${i.isVideo ? 'video' : ''}"><img loading="lazy" src="${i.image}" alt=""></div>`
    : "";
  const classes = ["item", compact ? "compact" : "", isRead ? "read" : ""]
    .filter(Boolean).join(" ");
  return `
    <article class="${classes}" data-link="${i.link}">
      <div class="item-body">
        <div class="meta">
          <span class="src-name">${i.source}</span>
          <span class="sep">·</span>
          <span class="date">${formatDate(i.date)}</span>
          ${isRumor(i) ? '<span class="tag">rumor</span>' : ''}
        </div>
        <h2><a href="${i.link}" target="_blank" rel="noopener">${i.title}</a></h2>
        ${i.excerpt ? `<p class="excerpt">${i.excerpt}</p>` : ""}
        ${i.excerpt ? `<p class="excerpt-lt" data-for="${i.link}"></p>` : ""}
      </div>
      ${thumbHtml}
    </article>
  `;
}

// --- render feed river ---
function renderFeed() {
  const feed = $("#feed");
  let items = applyFilters(state.items, { keepRead: !state.hideRead });
  items = items.filter(i => state.active.has(i.sourceId));
  if (state.onlyRumors) items = items.filter(isRumor);
  if (state.category !== "all") items = items.filter(i => i.cat === state.category);
  items.sort((a, b) => (b.date?.getTime() || 0) - (a.date?.getTime() || 0));
  if (!items.length) {
    feed.innerHTML = '<div class="loading">No items in this view. Try another category or toggle filters.</div>';
    return;
  }
  feed.innerHTML = items.map(i => renderItemHtml(i)).join("");
  feed.querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.closest("a")) return;
      const link = el.getAttribute("data-link");
      window.open(link, "_blank", "noopener");
      markRead(link);
    });
  });
  feed.querySelectorAll(".item a").forEach(a => {
    a.addEventListener("click", () => markRead(a.getAttribute("href")));
  });
  translateVisible();
}

// --- read state (localStorage only, web version) ---
const READ_KEY = "daily-read-urls-v1";
async function loadReadState() {
  try {
    const arr = JSON.parse(localStorage.getItem(READ_KEY) || "[]");
    state.readUrls = new Set(arr);
  } catch (e) { /* ignore */ }
}
function saveReadState() {
  const arr = [...state.readUrls].slice(-5000);
  localStorage.setItem(READ_KEY, JSON.stringify(arr));
}
async function markRead(url) {
  if (!url || state.readUrls.has(url)) return;
  state.readUrls.add(url);
  saveReadState();
  document.querySelectorAll(`[data-link="${CSS.escape(url)}"]`).forEach(el => el.classList.add("read"));
}

// --- main load ---
let QUOTES_CACHE = null;
async function loadQuote() {
  try {
    if (!QUOTES_CACHE) {
      const res = await fetch("/daily/quotes.json");
      if (!res.ok) return;
      QUOTES_CACHE = await res.json();
    }
    renderQuote();
    $("#quote-reroll").onclick = () => {
      state.quoteOffset = (state.quoteOffset + 1) % QUOTES_CACHE.length;
      renderQuote();
    };
  } catch (e) { /* ignore */ }
}

function renderQuote() {
  if (!QUOTES_CACHE || !QUOTES_CACHE.length) return;
  const d = new Date();
  const dayNum = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  const base = ((dayNum * 2654435761) >>> 0) % QUOTES_CACHE.length;
  const q = QUOTES_CACHE[(base + state.quoteOffset) % QUOTES_CACHE.length];
  // Leave raw text so ::first-letter can pick up the real first letter as the drop cap
  $("#quote-text").textContent = q.text;
  $("#quote-text-lt").textContent = q.text_lt || "";
  $("#quote-text-lt").style.display = q.text_lt ? "block" : "none";
  $("#quote-attr").textContent = "— " + q.by;
  $("#quote").style.display = "block";
}

// --- Lithuanian translation for article excerpts ---
const TRANS_CACHE_KEY = "daily-trans-lt-v1";
function loadTransCache() {
  try { return JSON.parse(localStorage.getItem(TRANS_CACHE_KEY)) || {}; } catch { return {}; }
}
function saveTransCache(cache) {
  // cap at 1000 entries, drop oldest
  const entries = Object.entries(cache);
  if (entries.length > 1000) {
    entries.sort((a, b) => (b[1].ts || 0) - (a[1].ts || 0));
    const trimmed = Object.fromEntries(entries.slice(0, 1000));
    localStorage.setItem(TRANS_CACHE_KEY, JSON.stringify(trimmed));
  } else {
    localStorage.setItem(TRANS_CACHE_KEY, JSON.stringify(cache));
  }
}

let transInFlight = null;
async function translateVisible() {
  // Cancel any previous batch so category switches don't pile up
  const myBatch = Symbol("batch");
  transInFlight = myBatch;

  const cache = loadTransCache();
  const now = Date.now();
  const els = [...document.querySelectorAll(".excerpt-lt[data-for]")];
  // Limit to top 25 visible to stay under free-tier rate limits
  const targets = els.slice(0, 25);

  for (const el of targets) {
    if (transInFlight !== myBatch) return; // cancelled
    const link = el.getAttribute("data-for");
    const item = state.items.find(i => i.link === link);
    if (!item || !item.excerpt) continue;
    const key = item.excerpt;
    if (cache[key] && cache[key].text) {
      el.textContent = cache[key].text;
      continue;
    }
    el.textContent = "…";
    el.classList.add("pending");
    try {
      // Direct call to MyMemory (serves CORS, free, no key).
      // `de=` email param lifts the daily limit from 5k to 50k words.
      const q = encodeURIComponent(item.excerpt.slice(0, 500));
      const res = await fetch(`https://api.mymemory.translated.net/get?q=${q}&langpair=en|lt&de=daily@leonsomov.com`);
      if (!res.ok) { el.textContent = ""; continue; }
      const data = await res.json();
      const text = ((data || {}).responseData || {}).translatedText || "";
      el.textContent = text;
      el.classList.remove("pending");
      if (text) {
        cache[key] = { text, ts: now };
        saveTransCache(cache);
      }
    } catch (e) {
      el.textContent = "";
    }
  }
}

async function fetchWithRetry(source, fresh) {
  try {
    return await fetchFeed(source, fresh);
  } catch (e) {
    await new Promise(r => setTimeout(r, 1000));
    return await fetchFeed(source, fresh);
  }
}

async function loadAll(fresh = false) {
  $("#status").textContent = "Fetching " + SOURCES.length + " feeds…";
  state.items = [];
  $("#feed").innerHTML = '<div class="loading">Fetching…</div>';
  $("#hero").style.display = "none";
  $("#river-rule").style.display = "none";
  const collected = [];
  let ok = 0, fail = 0;
  await Promise.all(SOURCES.map(async s => {
    try {
      const xml = await fetchWithRetry(s, fresh);
      collected.push(...parseFeed(xml, s));
      ok++;
    } catch (e) {
      fail++;
      console.warn("Failed:", s.name, e);
    }
  }));
  state.items = collected;
  renderHero();
  renderFeed();
  const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  $("#status").textContent = `${ok} feeds · ${state.items.length} stories${fail ? ` · ${fail} failed` : ""} · ${now}`;
  if (!state.items.length) {
    $("#feed").innerHTML = '<div class="loading">All feeds failed. Check that the local server is running.</div>';
  }
}

$("#refresh").onclick = () => loadAll(true);

// --- drawer ---
function openDrawer() {
  $("#drawer").classList.add("open");
  $("#drawer-overlay").classList.add("open");
  $("#drawer").setAttribute("aria-hidden", "false");
}
function closeDrawer() {
  $("#drawer").classList.remove("open");
  $("#drawer-overlay").classList.remove("open");
  $("#drawer").setAttribute("aria-hidden", "true");
}

// --- init ---
(async () => {
  setTheme();
  renderTodToggle();
  renderTabs();
  renderDrawerChips();
  renderToggles();
  $("#open-drawer").onclick = openDrawer;
  $("#close-drawer").onclick = closeDrawer;
  $("#drawer-overlay").onclick = closeDrawer;
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeDrawer();
  });
  await Promise.all([loadReadState(), loadQuote()]);
  await loadAll();
  setInterval(() => { if (state.todOverride === "auto") setTheme(); }, 10 * 60 * 1000);
})();
</script>
